# Frontend static app — separate from the backend app "stock-analysis-tw".
# Deploy from the backend/ directory for the API.

app = 'stock-analysis-tw-web'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
